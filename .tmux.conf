# Better terminal setup for kitty/tmux
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"

# Let apps (kitty notifications, Claude Code) pass escape sequences through tmux
set -g allow-passthrough on

# Ensure UTF-8 locale in the tmux server environment
set-environment -g LANG en_US.UTF-8
set-environment -g LC_ALL en_US.UTF-8
set-environment -g LC_CTYPE en_US.UTF-8

# Propagate locale vars when attaching from a client
set -ga update-environment " LANG LC_ALL LC_CTYPE"

# Clipboard integration
set -g set-clipboard on

# Mouse
set -g mouse on

# Set Ctrl-a as the default prefix key combination
set -g prefix C-a
unbind C-b

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind s choose-tree -s -O name

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'

# Restore vim session
set -g @resurrect-strategy-vim 'session'

# Vi mode
set-window-option -g mode-keys vi

# Copy mode keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Splits keep current path
bind '"' split-window -v -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"

# Pass Ctrl-a through
bind C-a send-prefix

# Shift+Enter -> ESC+Enter (for apps like Claude Code inside tmux)
bind -n S-Enter send-keys Escape "[13;2u"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

bind O switch-client -l

run '~/.tmux/plugins/tpm/tpm'
