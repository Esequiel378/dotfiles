# Map Ctrl+Shift+6 to send Ctrl+^ (0x1E) for Neovim buffer switching
# Needed because the Corne keyboard produces ^ via Shift+6
map ctrl+shift+6 send_text all \x1e

# Force literal ^ on Shift+6 so nvim receives it cleanly through tmux
# (kitty's enhanced keyboard protocol would otherwise encode this as CSI 54;2u,
# which tmux without extended-keys mangles before it reaches nvim)
map shift+6 send_text all ^

# Newline-in-input for Claude Code: send Option+Enter (\x1b\r), which Ink/readline
# recognizes as Meta+Enter. The previous \x1b[13;2u (kitty CSI u) was not parsed
# by Claude Code and fell through as a submit.
map shift+enter send_text all \x1b\r
map cmd+enter send_text all \x1b\r

font_family JetBrainsMono Nerd Font

open_url_with default
mouse_map cmd+left release grabbed,ungrabbed mouse_handle_click link
